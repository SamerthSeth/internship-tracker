<div class="flex flex-col items-center gap-xs">

<div class="flex flex-col gap-xs">

<input class="bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm focus:ring-2 focus:ring-primary focus:outline-none transition-all text-on-surface font-body-base" placeholder="john@example.com" type="email"/>

<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant">Password</label>
<span class="font-label-caps text-label-caps text-tertiary">Strong</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-md py-sm focus:ring-2 focus:ring-primary focus:outline-none transition-all text-on-surface font-body-base pr-xl" type="password" value="••••••••••••"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline text-[20px] cursor-pointer" data-icon="visibility">visibility</span>

<div class="flex gap-xs mt-xs">
<div class="flex-1 h-1 bg-tertiary rounded-full"></div>

</div>

<p class="font-body-base text-body-base text-on-surface-variant">
